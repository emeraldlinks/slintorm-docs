<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <clipPath id="clip">
      <rect x="0" y="0" width="120" height="120" rx="22"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="120" height="120" rx="22" fill="#0F172A"/>

  <g clip-path="url(#clip)">
    <!-- Row tracks -->
    <rect x="14" y="22" width="92" height="13" rx="3.5" fill="#1E293B"/>
    <rect x="14" y="40" width="92" height="13" rx="3.5" fill="#1E293B"/>
    <rect x="14" y="58" width="92" height="13" rx="3.5" fill="#1E293B"/>
    <rect x="14" y="76" width="92" height="13" rx="3.5" fill="#1E293B"/>
    <rect x="14" y="94" width="92" height="13" rx="3.5" fill="#1E293B"/>

    <!-- S-form highlighted segments -->
    <rect x="46" y="22" width="60" height="13" rx="3.5" fill="#22C55E" filter="url(#glow)"/>
    <rect x="14" y="40" width="60" height="13" rx="3.5" fill="#22C55E" opacity="0.85"/>
    <rect x="14" y="58" width="92" height="13" rx="3.5" fill="#22C55E" opacity="0.65"/>
    <rect x="46" y="76" width="60" height="13" rx="3.5" fill="#22C55E" opacity="0.85"/>
    <rect x="14" y="94" width="60" height="13" rx="3.5" fill="#22C55E" filter="url(#glow)"/>

    <!-- Active cell dots -->
    <circle cx="103" cy="28.5" r="4" fill="#4ADE80"/>
    <circle cx="71"  cy="46.5" r="4" fill="#4ADE80" opacity="0.7"/>
    <circle cx="14"  cy="64.5" r="4" fill="#4ADE80" opacity="0.5"/>
    <circle cx="103" cy="82.5" r="4" fill="#4ADE80" opacity="0.7"/>
    <circle cx="71"  cy="100.5" r="4" fill="#4ADE80"/>
  </g>

  <!-- Border -->
  <rect x="0.75" y="0.75" width="118.5" height="118.5" rx="21.25" fill="none" stroke="#2D3F57" stroke-width="1.5"/>
</svg>
